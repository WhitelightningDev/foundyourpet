<!-- Material Dialog content -->
<div class="dialog-content text-center p-4 rounded shadow-lg" style="background: white; max-width: 400px; margin: auto;">
    <lord-icon
      src="https://cdn.lordicon.com/zybujcxz.json"
      trigger="hover"
      stroke="light"
      colors="primary:#000000,secondary:#c76f16"
      style="width: 90px; height: 90px; margin-bottom: 15px;">
    </lord-icon>

    <h2 class="fw-bold mb-3 text-dark">Have You Signed Up?</h2>
    <p class="fs-5 text-muted mb-4">If you have an account, log in. If not, sign up and get started!</p>

    <!-- Buttons -->
    <div class="d-flex justify-content-center gap-3">
      <button mat-button (click)="onYesClick()" class="btn btn-dark px-4 py-2 fw-semibold shadow-sm">Yes, Log In</button>
      <button mat-button (click)="onNoClick()" class="btn btn-outline-danger px-4 py-2 fw-semibold shadow-sm">No, Sign Up</button>
    </div>
</div>
